# configs/example.yaml
#
# Example study configuration for run_analysis.py / make_plot.py
#
# Usage:
#   python run_analysis.py --config configs/example.yaml
#   python make_plot.py    --cache diagnostics.pkl --config configs/example.yaml

# Root directory prepended to all filenames
root: /Users/wolfe/Desktop/projects/volcanos/benchmarks

# Files to analyze.  Each entry is either a plain filename string, or a dict
# with name/grav/mwdry for non-Earth gravity (e.g. other planets).
files:
  - name: ExoCAM_thai_ben1_L51_n68equiv.cam.h0.avg.nc
    grav: 9.1197288
    mwdry: 28.0
  - name: ExoCAM_thai_ben2_L51_n68equiv.cam.h0.avg.nc
    grav: 9.1197288
    mwdry: 44.0
  - ExoCAM_thai_hab1_L51_n68equiv.cam.h0.avg.nc
  - ExoCAM_thai_hab2_L51_n68equiv.cam.h0.avg.nc
  # Example with custom gravity/mwdry:
  # - name: venus_run.cam.h0.avg.nc
  #   grav: 8.87
  #   mwdry: 43.45

# Computation options
options:
  vert:      true    # compute vertical profiles (slow, needed for vert_1x3/vert_2x2)
  synch:     true    # substellar/antistellar means (tidally locked planets)
  cf:        true    # clear-sky fluxes and cloud radiative effect
  printdata: false   # write global means to analysis_output.txt

# Fields to save in cache for contour plots.
# Only fields listed here will be available to map_latlon / section_* plots.
# Omit or leave empty lists to skip contour plot caching.
cache:
  save: diagnostics.pkl
  fields_2d:
    - TS
    - CLDTOT
    - FLNT
    - FSNT
    - ICEFRAC
  fields_3d:
    - T
    - Q
    - CLOUD

# Plots to generate inline after analysis.
# Each entry needs at minimum: type and output.
plots:

  # --- vertical profile plots ---
  - type: vert_1x3
    output: vert_profiles.png

  - type: vert_2x2
    top:          [0, 1]
    bottom:       [2, 3]
    top_title:    "Earth-similar"
    bottom_title: "TRAPPIST-1 e"
    output: vert_profiles_2x2.png

  # --- surface map ---
  - type: map_latlon
    var:       TS
    sim_index: 0
    output:    map_TS_earth.png

  # --- latitude-pressure zonal mean cross-section ---
  - type: latpres
    var:       T
    sim_index: 0
    output:    T_latpres_zonalavg.png

  # --- longitude-pressure equatorial cross-section ---
  - type: lonpres
    var:       T
    sim_index: 2
    lat_deg:   0.0
    output:    T_lonpres_lat0.0.png
